<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FavGames - Game Details</title>
    <link rel="stylesheet" href="access/css/index.css">
    <link rel="shortcut icon" href="access/img/Logo.jpg" type="image/x-icon">
    <style>
        .game-detail-section {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .main__container {
            padding-top: calc(var(--header-height) + 2.5rem);
        }
        .game-detail-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            align-items: start;
        }
        .poster-card {
            background: #111;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(0,0,0,.25);
            aspect-ratio: 3 / 2;
            min-height: 420px;
            height: auto;
            width: 100%;
        }
        .poster-card img {
            width: 100%;
            display: block;
            object-fit: cover;
            height: 100%;
        }
        .game-detail-meta {
            display: grid;
            gap: 20px;
        }
        .game-detail-meta h1 {
            font-size: 3rem;
            margin: 0;
        }
        .game-detail-meta .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            color: #ddd;
        }
        .meta-pill {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.95rem;
        }
        .game-detail-meta p {
            line-height: 1.8;
            color: #f0f0f0;
        }
        .detail-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .detail-actions .btn {
            padding: 14px 24px;
        }
        .detail-trailer,
        .detail-gallery {
            margin-top: 40px;
            display: grid;
            gap: 20px;
        }
        .detail-trailer iframe {
            width: 100%;
            min-height: 320px;
            border-radius: 18px;
            border: 0;
        }
        .detail-gallery {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .detail-gallery img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 18px;
            box-shadow: 0 16px 40px rgba(0,0,0,.18);
        }
        @media (max-width: 960px) {
            .game-detail-grid {
                grid-template-columns: 1fr;
            }
            .detail-gallery {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 640px) {
            .detail-gallery {
                grid-template-columns: 1fr;
            }
            .game-detail-meta h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- header -->
    <header class="header">
        <div class="left__side__header">
            <div class="logo">
                <h1>FavGames</h1>
                <img src="access/img/Logo.jpg" alt="FavGames logo" class="logo__img">
            </div>
            <nav class="navbar">
                <a href="index.html" class="nav__link">Home</a>
                <a href="#" class="nav__link">About</a>
                <a href="#" class="nav__link">Category</a>
                <a href="#" class="nav__link">Favourited Games</a>
            </nav>
        </div>
        <div class="right__side__header">
            <input type="text" id="search-bar" placeholder="Search for a game...">
            <div class="account">
                <img src="access/img/ryou yamada avatar.jpg" alt="User avatar" class="account__avatar">
                <h1 id="Username">Ryou</h1>
            </div>
        </div>
    </header>

    <main class="main__container container">
        <section class="game-detail-section">
            <div class="game-detail-grid">
                <div class="poster-card">
                    <img id="detail-poster" src="access/img/Poster.jpg" alt="Game poster">
                </div>

                <div class="game-detail-meta">
                    <div class="detail-tags">
                        <span id="detail-genres" class="meta-pill">Loading genres...</span>
                    </div>
                    <h1 id="detail-title">Loading game title...</h1>
                    <div class="meta-row">
                        <span id="detail-release" class="meta-pill">Release: --</span>
                        <span id="detail-gametag" class="meta-pill">GameTag: --</span>
                        <span id="detail-platform" class="meta-pill">Platform: --</span>
                    </div>
                    <p id="detail-description" class="game-detail__description">
                        Fetching game description...
                    </p>
                    <div class="detail-actions">
                        <button class="btn btn-primary">Add to Favourites</button>
                        <a href="index.html" class="btn btn-secondary">Back to Home</a>
                    </div>
                </div>
            </div>

            <div class="detail-trailer">
                <h2>Game Trailer</h2>
                <div id="detail-trailer-container">
                    <p>Loading trailer...</p>
                </div>
            </div>

            <div class="detail-gallery">
                <img src="access/img/Poster.jpg" alt="Screenshot 1">
                <img src="access/img/Poster.jpg" alt="Screenshot 2">
                <img src="access/img/Poster.jpg" alt="Screenshot 3">
            </div>
        </section>
    </main>
    <script src="api.js"></script>
    <script src="detail.js"></script>
</body>
</html>
