<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FavGames - Main Page</title>
    <link rel="stylesheet" href="access/css/index.css">
</head>
<body>
    <!-- header -->
    <header class="header">
        <div class="left__side__header">
            <div class="logo">
                <h1>FavGames</h1>
                <img src="access/img/Logo.jpg" alt="" class="logo__img">
            </div>
            <nav class="navbar">
                <a href="#" class="nav__link">Home</a>
                <a href="#" class="nav__link">About</a>
                <a href="#" class="nav__link">Category</a>
            </nav>
        </div>
        <div class="right__side__header">
            <input type="text" id="search-bar" placeholder="Search for a game...">
            <div class="account">
                <img src="access/img/ryou yamada avatar.jpg" alt="" class="account__avatar">
                <h1 id="Username">Ryou</h1>
            </div>
        </div>
    </header>
    <!-- main content -->
    <div class="main__container container">
        <img src="access/img/background.jpg" alt="" class="background__img">

        <section class="intro-card">
            <h1>Welcome to ULTRAWIKI</h1>
            <p class="subheading">Your Ultra-mate wiki sites for searching enemies and weapons</p>
            <div class="button-group">
                <a href="login.html" class="btn btn-primary">Login</a>
                <a href="sign-in.html" class="btn btn-secondary">Sign Up</a>
            </div>
        </section>

        <section class="game-list-section">

            <h2 class="category-label">Husk</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous games">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next games">&#10095;</button>
                <div class="game-grid must-play-games"></div>
            </div>

            <h2 class="category-label">Demons</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous games">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next games">&#10095;</button>
                <div class="game-grid popular-games"></div>
            </div>

            <h2 class="category-label">Angels</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous games">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next games">&#10095;</button>
                <div class="game-grid indie-games"></div>
            </div>

            <h2 class="category-label">Prime Soul</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous games">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next games">&#10095;</button>
                <div class="game-grid goty-games"></div>
            </div>

            <h2 class="category-label">Top Rated</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous games">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next games">&#10095;</button>
                <div class="game-grid top-rated-games"></div>
            </div>

            <h2 class="category-label">Upcoming Releases</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous games">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next games">&#10095;</button>
                <div class="game-grid upcoming-games"></div>
            </div>
        </section>
    </div>
    <footer class="footer">
        <p>&copy; 2026 FavGames. All rights reserved.</p>
        <nav class="navbar footer-nav">
            <a href="#" class="footer__link">About</a>
            <a href="#" class="footer__link">Contact</a>
            <a href="#" class="footer__link">Privacy Policy</a>
            <a href="#" class="footer__link">Terms of Service</a>
            <a href="#" class="footer__link">Github Page</a>
        </nav>
    </footer>
    <script src="access/js/index.js"></script>
    <script src="access/js/fetch.js"></script>
</body>
</html>
