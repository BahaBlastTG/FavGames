<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FavGames - Login</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <div class="main__container">
        <img src="../img/background.jpg" alt="" class="background__img">
        <div class="login-card">
            <h1>Welcome back</h1>
            <p class="subheading">Log into your account and explore more games!</p>

            <form action="#" class="login-form" id="login-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>

                <a href="#" class="forgot-link">Forgot password</a>
                <p class="form-message" id="login-message"></p>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <p class="sign-up">
                Don’t have an account? <a href="sign-in.html">Sign up for free</a>
            </p>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2026 FavGames. All rights reserved.</p>
        <nav class="navbar footer-nav">
            <a href="#" class="footer__link">About</a>
            <a href="#" class="footer__link">Contact</a>
            <a href="#" class="footer__link">Privacy Policy</a>
            <a href="#" class="footer__link">Terms of Service</a>
            <a href="#" class="footer__link">Github Page</a>
        </nav>
    </footer>
    <script src="../js/profile.js"></script>
</body>
</html>
